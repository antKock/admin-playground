<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold text-text-primary">{{ title() }}</h1>
    @if (createRoute()) {
      <a [routerLink]="createRoute()" class="btn-primary flex items-center gap-2">
        {{ createLabel() }}
      </a>
    }
  </div>

  <ng-content select="[filters]" />

  <ng-content select="[table]" />

  @if (hasMore()) {
    <div class="text-center mt-4">
      <button (click)="loadMore.emit()" class="btn-secondary">Charger plus</button>
    </div>
  }

  @if (hasLoaded() && isEmpty()) {
    <p class="text-center text-text-secondary mt-8">{{ emptyMessage() }}</p>
  }
</div>
