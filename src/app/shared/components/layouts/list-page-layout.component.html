<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold text-text-primary">{{ title() }}</h1>
    @if (createRoute()) {
      <a [routerLink]="createRoute()" class="inline-flex items-center gap-1 whitespace-nowrap px-4 py-2 bg-brand text-white rounded-lg hover:bg-brand-hover transition-colors">
        <lucide-icon [img]="PlusIcon" [size]="16" /> {{ createLabel() }}
      </a>
    }
  </div>

  <ng-content select="[filters]" />

  <ng-content select="[table]" />

  @if (hasMore()) {
    <div class="text-center mt-4">
      <button (click)="loadMore.emit()" class="btn-secondary">Charger plus</button>
    </div>
  }

  @if (hasLoaded() && isEmpty()) {
    <p class="text-center text-text-secondary mt-8">{{ emptyMessage() }}</p>
  }
</div>
