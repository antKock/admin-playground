<div class="p-6">
  <app-breadcrumb [items]="breadcrumbs()" />

  @if (isLoading()) {
    <div class="animate-pulse space-y-4 mt-4">
      <div class="h-8 bg-surface-muted rounded w-1/3"></div>
      <div class="h-4 bg-surface-muted rounded w-1/2"></div>
      <div class="h-4 bg-surface-muted rounded w-1/4"></div>
    </div>
  } @else {
    <ng-content select="[metadata]" />
    <ng-content select="[sections]" />
    <ng-content select="[actions]" />
  }
</div>
