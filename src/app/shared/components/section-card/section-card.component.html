<div class="bg-gray-50 border-l-4 border-blue-400 rounded-lg overflow-hidden" [class.border-gray-300]="disabled()">
  <!-- Header -->
  <div class="flex items-center px-4 py-3 gap-2">
    <ng-content select="[toggle]" />
    <span>{{ typeConfig().icon }}</span>
    <h3 class="text-sm font-semibold text-text-primary">{{ sectionName() }}</h3>
    <div class="flex-1"></div>
    @if (paramHints(); as hints) {
      <app-param-hint-icons [hints]="hints" />
    }
    <button
      type="button"
      class="p-1 rounded hover:bg-gray-200 transition-colors flex-shrink-0"
      (click)="onToggleCollapse()"
      aria-label="Toggle parameters"
    >
      <lucide-icon
        [img]="ChevronDown"
        [size]="16"
        class="text-text-tertiary transition-transform"
        [class.rotate-180]="!isCollapsed()"
      />
    </button>
  </div>

  <!-- Params (collapsible) -->
  @if (!isCollapsed()) {
    <div class="px-4 py-2">
      <ng-content select="[params]" />
    </div>
    <div class="border-t border-dotted border-gray-300 mx-4"></div>
  }

  <!-- Indicators (always visible) -->
  <div class="px-4 py-3">
    <ng-content />
  </div>
</div>
