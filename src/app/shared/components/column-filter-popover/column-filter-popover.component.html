<div class="filter-popover" role="dialog" aria-label="Filtrer la colonne" [style.top.px]="popoverTop()" [style.left.px]="popoverLeft()" (keydown)="onKeydown($event)">
  @if (options().length > 10) {
    <div class="filter-search">
      <input
        type="text"
        class="filter-search-input"
        placeholder="Rechercher..."
        [value]="searchTerm()"
        (input)="onSearchInput($event)"
      />
    </div>
  }
  <div class="filter-options">
    @for (option of filteredOptions(); track option.id) {
      <label class="filter-option">
        <input
          type="checkbox"
          [checked]="isSelected(option.id)"
          (change)="toggleOption(option.id)"
        />
        <span class="filter-option-label">{{ option.label }}</span>
      </label>
    }
    @if (filteredOptions().length === 0) {
      <div class="filter-empty">Aucun résultat</div>
    }
  </div>
  <div class="filter-actions">
    <button class="filter-clear-btn" (click)="onClear()" [disabled]="selected().length === 0">
      Effacer
    </button>
  </div>
</div>
