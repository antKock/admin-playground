<a class="skip-to-content" href="#main-content">Skip to content</a>
<div class="app-layout">
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <span class="text-lg font-semibold text-brand">Lauréat Admin</span>
    </div>
    <ul class="nav-list">
      <li class="nav-section-label">Configuration</li>
      @for (item of configItems; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="nav-item-active"
            class="nav-item"
          >
            <lucide-icon [img]="item.icon" [size]="18" class="nav-icon"></lucide-icon>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
      <li class="nav-section-label">Administration</li>
      @for (item of adminItems; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="nav-item-active"
            class="nav-item"
          >
            <lucide-icon [img]="item.icon" [size]="18" class="nav-icon"></lucide-icon>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="main-area">
    <header class="header">
      <div class="flex-1"></div>
      <div class="flex items-center gap-3">
        @if (userEmail(); as email) {
          <span class="text-sm text-text-primary">{{ email }}</span>
        }
        <a
          href="https://actee.gitbook.io/actee/"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-1 rounded px-2 py-1.5 text-sm text-text-secondary transition-colors hover:bg-surface-muted hover:text-text-primary"
          aria-label="Aide"
        >
          <lucide-icon [img]="HelpCircle" [size]="16"></lucide-icon>
          <span>Aide</span>
        </a>
        <button
          (click)="onLogout()"
          class="flex items-center gap-2 rounded px-3 py-1.5 text-sm text-text-secondary transition-colors hover:bg-surface-muted hover:text-text-primary"
        >
          <lucide-icon [img]="LogOut" [size]="16"></lucide-icon>
          <span>Déconnexion</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="content">
      <router-outlet />
    </main>
  </div>
</div>
