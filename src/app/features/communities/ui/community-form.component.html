<app-form-page-layout
  [breadcrumbs]="formBreadcrumbs()"
  [title]="formTitle"
  [isSaving]="submitting()"
  [isDirty]="form.dirty"
  (save)="onSubmit()"
  (cancel)="goBack()"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <app-form-field label="Nom *" [control]="form.get('name')!" errorMessage="Le nom est obligatoire." fieldId="name">
      <input
        id="name"
        formControlName="name"
        class="w-full px-3 py-2 border border-border rounded-lg text-text-primary bg-surface-base focus:outline-none focus:ring-2 focus:ring-brand"
      />
    </app-form-field>

    <app-form-field label="SIRET *" [control]="form.get('siret')!" errorMessage="Le SIRET doit contenir exactement 14 chiffres." fieldId="siret">
      <input
        id="siret"
        formControlName="siret"
        class="w-full px-3 py-2 border border-border rounded-lg text-text-primary bg-surface-base focus:outline-none focus:ring-2 focus:ring-brand"
      />
    </app-form-field>

    <div>
      <label for="public_comment" class="block text-sm font-medium text-text-primary mb-1">Commentaire public</label>
      <textarea
        id="public_comment"
        formControlName="public_comment"
        rows="3"
        class="w-full px-3 py-2 border border-border rounded-lg text-text-primary bg-surface-base focus:outline-none focus:ring-2 focus:ring-brand"
      ></textarea>
    </div>

    <div>
      <label for="internal_comment" class="block text-sm font-medium text-text-primary mb-1">Commentaire interne</label>
      <textarea
        id="internal_comment"
        formControlName="internal_comment"
        rows="3"
        class="w-full px-3 py-2 border border-border rounded-lg text-text-primary bg-surface-base focus:outline-none focus:ring-2 focus:ring-brand"
      ></textarea>
    </div>
  </form>
</app-form-page-layout>
