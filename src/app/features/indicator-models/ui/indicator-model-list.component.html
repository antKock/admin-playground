<app-list-page-layout
  title="Modèles d'indicateur"
  createLabel="Créer un modèle d'indicateur"
  createRoute="/indicator-models/new"
  [hasLoaded]="hasLoaded()"
  [isEmpty]="facade.isEmpty()"
  [hasMore]="facade.hasMore()"
  [emptyMessage]="emptyMessage() ?? ''"
  (loadMore)="onLoadMore()"
>
  <app-data-table table
    [columns]="columns"
    [data]="rows()"
    [isLoading]="facade.isLoading()"
    [hasMore]="facade.hasMore()"
    [totalCount]="facade.totalCount()"
    [emptyMessage]="emptyMessage()"
    (rowClick)="onRowClick($event)"
    (loadMore)="onLoadMore()"
    (filterChange)="onFilterChange($event)"
    (clearFiltersClick)="clearFilters()"
  />
</app-list-page-layout>
