name: Sync production with staging

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Push staging to production
        run: git push origin staging:production --force
